name: Run Pytest with uv and QtBot

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DISPLAY: ":99.0"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.11"

      - name: Install system Qt dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            xvfb \
            libxkbcommon-x11-0 \
            libegl1

      - name: Sync Python dependencies from pyproject.toml
        run: uv sync

      - name: Run tests in virtual display
        run: xvfb-run -a uv run python -m pytest -v

