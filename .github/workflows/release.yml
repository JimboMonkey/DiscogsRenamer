name: Create Release and AppImage on Tag

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-beta') }}

  build-appimage:
    runs-on: ubuntu-latest
    needs: create-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "0.8.11"

      - name: Install system Qt and X11 dependencies
        run: |
          sudo apt update
          sudo apt install -y \
            qt6-base-dev \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-cursor0 \
            libegl1 \
            fuse

      - name: Sync Python dependencies
        run: uv sync --all-groups

      - name: Build PyInstaller bundle
        run: |
          uv run pyinstaller \
            --noconfirm \
            --name DiscogsRenamer \
            --windowed \
            --onedir \
            --add-data="discogsrenamer/gui/icons:discogsrenamer/gui/icons" \
            main.py

      - name: Prepare AppDir
        run: |
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps

          # Copy PyInstaller output
          cp -r dist/DiscogsRenamer/* AppDir/usr/bin/
          
          # Create AppRun launcher
          cat > AppDir/AppRun << 'EOF'
          #!/bin/bash
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/DiscogsRenamer"
          EOF
          chmod +x AppDir/AppRun

          # Create .desktop file
          cat > AppDir/usr/share/applications/DiscogsRenamer.desktop << 'EOF'
          [Desktop Entry]
          Name=DiscogsRenamer
          Exec=AppRun
          Icon=DiscogsRenamer
          Type=Application
          Categories=Utility;
          Terminal=false
          EOF

          # Install the icon
          cp discogsrenamer/gui/icons/DiscogsRenamer.png AppDir/usr/share/icons/hicolor/256x256/apps/DiscogsRenamer.png

      - name: Download appimagetool
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool-x86_64.AppImage

      - name: Extract version from git tag
        id: get_version
        run: echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Build AppImage
        run: |
          ./appimagetool-x86_64.AppImage AppDir/
          mv DiscogsRenamer*.AppImage DiscogsRenamer-${{ steps.get_version.outputs.version }}-x86_64.AppImage

      - name: Upload AppImage to Release
        uses: softprops/action-gh-release@v2
        with:
          files: "DiscogsRenamer-${{ steps.get_version.outputs.version }}-x86_64.AppImage"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

